<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>midi-ports + webmidi.js demo</title>
    <style>
      body { font: 14px/1.5 system-ui, sans-serif; margin: 2rem; max-width: 720px; }
      h1 { font-size: 1.2rem; }
      .sub { color: #666; margin-top: -0.5rem; }
      .sub b { color: #333; }
      button { font: inherit; padding: 0.3rem 0.7rem; cursor: pointer; }
      .port { border: 1px solid #ddd; border-radius: 6px; padding: 0.6rem 0.8rem; margin: 0.5rem 0; }
      .port small { color: #666; }
      .tag { font-size: 11px; padding: 1px 6px; border-radius: 999px; background: #eee; margin-left: 4px; }
      #log { background: #111; color: #0f0; padding: 0.8rem; height: 220px; overflow: auto;
             font: 12px/1.4 ui-monospace, monospace; border-radius: 6px; white-space: pre-wrap; }
    </style>
  </head>
  <body>
    <h1>midi-ports + webmidi.js demo</h1>
    <p class="sub"><b>midi-ports</b> resolves the device topology · <b>webmidi.js</b> sends &amp; parses messages</p>
    <p><button id="start">Request MIDI access</button> <span id="status">idle</span></p>
    <div id="ports"></div>
    <h2 style="font-size: 1rem">Event log</h2>
    <div id="log"></div>

    <script type="module">
      // midi-ports is loaded from the local build — run `pnpm run build` (or
      // `pnpm run dev`) first. webmidi.js is pulled from a CDN as ESM so the
      // demo needs no bundler.
      import { requestMidiPorts } from '../dist/index.js'
      import { WebMidi } from 'https://esm.sh/webmidi@3.1.16'

      const $ = (id) => document.getElementById(id)
      const log = (msg) => {
        const el = $('log')
        el.textContent += `${new Date().toLocaleTimeString()}  ${msg}\n`
        el.scrollTop = el.scrollHeight
      }

      let midi // midi-ports instance (topology)

      function render() {
        const container = $('ports')
        container.innerHTML = ''
        if (!midi.ports.size) {
          container.textContent = 'No ports connected. Plug something in.'
          return
        }
        for (const port of midi.ports.values()) {
          const div = document.createElement('div')
          div.className = 'port'
          const tags =
            (port.input ? '<span class="tag">in</span>' : '') +
            (port.output ? '<span class="tag">out</span>' : '')
          div.innerHTML = `<strong>${port.displayName}</strong> ${tags}
            <br /><small>${port.name} · ${port.manufacturer || 'unknown maker'}</small>`
          if (port.output) {
            const rawName = port.displayName
            const btn = document.createElement('button')
            btn.textContent = 'Play C4 (webmidi.js)'
            btn.style.marginTop = '0.5rem'
            btn.onclick = () => {
              // Re-resolve the live port by its raw OS name. midi.get()
              // normalizes the lookup (since v3.1.0), so the device name works
              // as-is — no need to pre-normalize to 'k-board'-style keys.
              const live = midi.get(rawName)
              if (!live?.output) {
                log(`✗ ${rawName} has no output right now`)
                return
              }
              // Bridge midi-ports → webmidi.js by the same raw name.
              WebMidi.getOutputByName(rawName)?.playNote('C4', { channels: 1, duration: 300 })
              log(`→ played C4 on ${rawName} (resolved via midi.get('${rawName}'))`)
            }
            div.appendChild(document.createElement('br'))
            div.appendChild(btn)
          }
          container.appendChild(div)
        }
      }

      // Let webmidi.js parse incoming messages on every input midi-ports found.
      function listenToInputs() {
        for (const port of midi.ports.values()) {
          if (!port.input) continue
          const input = WebMidi.getInputByName(port.displayName)
          if (!input) continue
          input.removeListener() // clear before re-attaching to avoid duplicates
          input.addListener('noteon', (e) =>
            log(`♪ ${port.displayName}: noteon ${e.note.identifier} (vel ${e.note.rawAttack})`),
          )
          input.addListener('noteoff', (e) => log(`♪ ${port.displayName}: noteoff ${e.note.identifier}`))
          input.addListener('controlchange', (e) =>
            log(`🎛 ${port.displayName}: CC ${e.controller.number} = ${e.rawValue}`),
          )
        }
      }

      $('start').onclick = async () => {
        try {
          // Enable both. The browser prompts for permission only once; both
          // libraries then observe the same devices. (sysex: true if needed.)
          await WebMidi.enable({ sysex: false })
          midi = await requestMidiPorts({ sysex: false })
          $('status').textContent = 'connected'
          log(`access granted — ${midi.ports.size} port(s)`)
          render()
          listenToInputs()

          // React to plugging/unplugging devices live (midi-ports topology).
          midi.on('statechange', ({ type, port }) => {
            log(`• ${type}: ${port.name}`)
            render()
            listenToInputs()
          })
        } catch (err) {
          $('status').textContent = 'error'
          log(`ERROR: ${err.message}`)
        }
      }
    </script>
  </body>
</html>
